<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnello | Vinhos Orgânicos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Italiana&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/styles.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</head>
<body>

    <div class="intro-overlay">
        <h1 class="intro-logo">Agnello</h1>
    </div>

    <header class="custom-header">
        <div class="container-fluid px-4 px-lg-5 header-grid">
            <div class="header-left">
                <a href="index.html" class="logo">Agnello</a>
            </div>

            <ul class="nav-links">
                <li><a href="produtos.html">Tintos</a></li>
                <li><a href="produtos.html">Brancos</a></li>
                <li><a href="produtos.html">Rosés</a></li>
                <li><a href="produtos.html">Kits</a></li>
                <li class="expandable-search">
                    <button class="search-toggle" id="searchToggleBtn"><i class="bi bi-search"></i></button>
                    <input type="text" class="search-input" id="searchInput" placeholder="Buscar vinhos...">
                </li>
            </ul>

            <div class="user-actions">
                <a href="perfil.html" class="profile-btn"><i class="bi bi-person-circle"></i></a>
                <button class="cart-btn" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                    <i class="bi bi-cart2"></i> R$ 0,00 (0)
                </button>
            </div>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h6>APRESENTANDO</h6>
            <h1>Vinhos<br>Orgânicos</h1>
            <div class="hero-buttons">
                <a href="produtos.html" class="btn-sand">VINHOS TINTOS</a>
                <a href="produtos.html" class="btn-outline-sand">VINHOS BRANCOS</a>
            </div>
        </div>
    </section>

    <section class="products-container">
        <h2 class="section-title">Melhor Seleção</h2>
        <p class="section-subtitle">EXPLORE NOSSA ADEGA</p>
        
        <div class="product-grid">
            <div class="product-card">
                <span class="tag branco">BRANCO</span>
                <div class="product-image-container">
                    <img src="./img/Gemini_Generated_Image_qdhdkwqdhdkwqdhd (1).png" class="product-image" alt="Vinho Branco">
                </div>
                <h3 class="product-title">Dona Isabella Chardonnay</h3>
                <p class="product-price">R$ 142,00</p>
                <button class="btn-buy-now">Comprar agora</button>
            </div>

            <div class="product-card">
                <span class="tag tinto">TINTO</span>
                <div class="product-image-container">
                    <img src="./img/Gemini_Generated_Image_qxx5exqxx5exqxx5 (1).png" class="product-image" alt="Vinho Tinto">
                </div>
                <h3 class="product-title">Valle Andino Reserva</h3>
                <p class="product-price">R$ 185,00</p>
                <button class="btn-buy-now">Comprar agora</button>
            </div>

            <div class="product-card">
                <span class="tag rose">ROSÉ</span>
                <div class="product-image-container">
                    <img src="./img/Gemini_Generated_Image_kwhst8kwhst8kwhs (1).png" class="product-image" alt="Vinho Rosé">
                </div>
                <h3 class="product-title">Château Bellevue Bordeaux</h3>
                <p class="product-price">R$ 160,00</p>
                <button class="btn-buy-now">Comprar agora</button>
            </div>
        </div>
    </section>


</body>
</html>
