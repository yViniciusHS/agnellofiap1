<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnello | Detalhes do Produto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Italiana&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">

    <header class="custom-header py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="../index.html" class="logo fs-2 text-decoration-none">Agnello</a>
            <div class="user-actions d-flex gap-3 align-items-center">
                <a href="./perfil.html" class="profile-btn text-white fs-4"><i class="bi bi-person-circle"></i></a>
                <button class="cart-btn border-0 bg-transparent text-white" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                    <i class="bi bi-cart2"></i> <span id="cart-total-header">R$ 0,00</span>
                </button>
                <a href="../index.html" class="text-white text-decoration-none ms-2"><i class="bi bi-arrow-left"></i> Voltar</a>
            </div>
        </div>
    </header>

    <main class="container my-5 py-5">
        <div class="row g-5">
            <div class="col-md-6">
                <div class="product-image-container bg-white rounded-4 shadow-sm p-5 d-flex justify-content-center align-items-center" style="min-height: 500px;">
                    <img id="product-img" src="" class="product-image img-fluid" alt="Vinho Selecionado">
                </div>
            </div>
            
            <div class="col-md-6">
                <span id="product-tag" class="tag mb-3 d-inline-block"></span>
                <h1 id="product-name" class="display-4 brand-font my-2">Carregando...</h1>
                <p id="product-price" class="fs-3 fw-bold text-dark">R$ 0,00</p>
                
                <p id="product-desc" class="text-muted my-4 lead">
                    </p>

                <div class="p-3 border rounded-4 bg-white mb-4">
                    <h6 class="fw-bold mb-2">Detalhes de Produção</h6>
                    <p id="product-prod" class="small text-muted mb-0"></p>
                </div>

                <div class="mb-4">
                    <h6 class="fw-bold mb-3">Perfil Sensorial (Sommelier)</h6>
                    <div style="max-width: 300px; margin: 0 auto;">
                        <canvas id="flavorRadarChart"></canvas>
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button id="add-to-cart-btn" class="btn btn-dark btn-lg rounded-pill py-3 fw-bold">
                        ADICIONAR AO CARRINHO
                    </button>
                    <div class="p-3 border rounded-4 d-flex align-items-center gap-3 bg-white">
                        <i class="bi bi-truck text-success fs-4"></i>
                        <span class="small">Frete grátis em pedidos acima de R$ 500.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header text-white" style="background-color: var(--hero-bg, #2b0b10);">
            <h5 class="offcanvas-title brand-font">Meu Carrinho</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div class="offcanvas-body-items flex-grow-1" id="cartItems">
                <p class="text-muted text-center py-4">Seu carrinho está vazio.</p>
            </div>
            <div class="border-top pt-3">
                <h5 id="cartTotal" class="brand-font">Total: R$ 0,00</h5>
                <button class="btn btn-dark w-100 rounded-pill py-3 mt-3 fw-bold">FINALIZAR COMPRA</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
